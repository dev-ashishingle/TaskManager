version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  api:
    image: devashishingle/taskmanager-api
    ports:
      - "8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: ${DB_CONNECTION}
    depends_on:
      - sqlserver

volumes:
  sqlserver_data:
